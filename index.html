<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Editor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container {
      max-width: 500px;
      margin: 20px auto;
      padding: 10px;
    }

    h1 {
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-top: 10px;
    }

    input {
      padding: 10px;
      margin-top: 5px;
      font-size: 1em;
    }

    textarea {
      margin-top: 15px;
      font-family: monospace;
      font-size: 1em;
      padding: 10px;
      width: 100%;
      height: 150px;
    }

    button {
      padding: 10px;
      margin-top: 15px;
      background-color: #007BFF;
      color: #FFF;
      border: none;
      font-size: 1em;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .zpl-output {
      margin-top: 20px;
      background: #f4f4f4;
      padding: 10px;
      border-radius: 5px;
      font-family: "Courier New", monospace;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Label Editor</h1>
    <form id="labelForm">
      <label for="title">Title</label>
      <input type="text" id="title" value="IRVINGTON POLICE" />

      <label for="subtitle">Subtitle</label>
      <input type="text" id="subtitle" value="RAPE KITS" />

      <label for="footer">Footer</label>
      <input type="text" id="footer" value="2026 BOX 76 #2" />

      <label for="barcode">Barcode</label>
      <input type="text" id="barcode" value="AIRV01PU" />

      <button type="button" onclick="generateZPL()">Generate Label</button>
    </form>

    <h2>Generated ZPL</h2>
    <textarea id="zplOutput" readonly></textarea>
  </div>

  <script>
    function generateZPL() {
      const title = document.getElementById("title").value;
      const subtitle = document.getElementById("subtitle").value;
      const footer = document.getElementById("footer").value;
      const barcode = document.getElementById("barcode").value;

      const zpl = `
^XA
^PW812
^LL1015
^LH0,0
^CI28

^FO15,15^GB782,985,6^FS

^FO680,40
^A0R,92,92
^FB900,1,0,C
^FD${title}^FS

^FO500,40
^A0R,130,130
^FB900,1,0,C
^FD${subtitle}^FS

^FO250,40
^A0R,125,125
^FB950,1,0,C
^FD${footer}^FS

^BY4,3,180
^FO70,270
^BCR,180,Y,N,N
^FD${barcode}^FS

^XZ
      `.trim();

      document.getElementById("zplOutput").value = zpl;
    }
  </script>
</body>
</html>
