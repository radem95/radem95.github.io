<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Editor with Live Preview</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container {
      max-width: 700px;
      margin: 20px auto;
      padding: 10px;
    }

    h1 {
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    label {
      margin-top: 10px;
    }

    input {
      padding: 10px;
      margin-top: 5px;
      font-size: 1em;
    }

    textarea {
      margin-top: 15px;
      font-family: monospace;
      font-size: 1em;
      padding: 10px;
      width: 100%;
      height: 150px;
    }

    button {
      padding: 10px;
      margin-top: 15px;
      background-color: #007BFF;
      color: #FFF;
      border: none;
      font-size: 1em;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .preview-container {
      margin-top: 20px;
      padding: 10px;
      border: 2px dashed #007BFF;
      border-radius: 8px;
      background: #f9f9f9;
    }

    .label-preview {
      position: relative;
      width: 400px;
      height: 250px;
      margin: 0 auto;
      background: white;
      border: 2px solid black;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
    }

    .label-preview h2,
    .label-preview h3,
    .label-preview p {
      margin: 0;
      text-align: center;
    }

    .barcode {
      height: 60px;
      width: 90%;
      background: repeating-linear-gradient(90deg, black 0, black 2px, white 2px, white 4px);
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Label Editor with Live Preview</h1>
    <form id="labelForm">
      <label for="title">Title</label>
      <input type="text" id="title" value="IRVINGTON POLICE" oninput="updatePreview()" />

      <label for="subtitle">Subtitle</label>
      <input type="text" id="subtitle" value="RAPE KITS" oninput="updatePreview()" />

      <label for="footer">Footer</label>
      <input type="text" id="footer" value="2026 BOX 76 #2" oninput="updatePreview()" />

      <label for="barcode">Barcode</label>
      <input type="text" id="barcode" value="AIRV01PU" oninput="updatePreview()" />

      <button type="button" onclick="generateZPL()">Generate ZPL</button>
    </form>

    <h2>Generated ZPL</h2>
    <textarea id="zplOutput" readonly></textarea>

    <div class="preview-container">
      <h2>Live Label Preview</h2>
      <div class="label-preview" id="labelPreview">
        <h2 id="previewTitle">IRVINGTON POLICE</h2>
        <h3 id="previewSubtitle">RAPE KITS</h3>
        <div class="barcode" title="Sample Barcode"></div>
        <p id="previewFooter">2026 BOX 76 #2</p>
      </div>
    </div>
  </div>

  <script>
    function updatePreview() {
      const title = document.getElementById("title").value;
      const subtitle = document.getElementById("subtitle").value;
      const footer = document.getElementById("footer").value;

      document.getElementById("previewTitle").textContent = title;
      document.getElementById("previewSubtitle").textContent = subtitle;
      document.getElementById("previewFooter").textContent = footer;
    }

    function generateZPL() {
      const title = document.getElementById("title").value;
      const subtitle = document.getElementById("subtitle").value;
      const footer = document.getElementById("footer").value;
      const barcode = document.getElementById("barcode").value;

      const zpl = `
^XA
^PW812
^LL1015
^LH0,0
^CI28

^FO15,15^GB782,985,6^FS

^FO680,40
^A0R,92,92
^FB900,1,0,C
^FD${title}^FS

^FO500,40
^A0R,130,130
^FB900,1,0,C
^FD${subtitle}^FS

^FO250,40
^A0R,125,125
^FB950,1,0,C
^FD${footer}^FS

^BY4,3,180
^FO70,270
^BCR,180,Y,N,N
^FD${barcode}^FS

^XZ
      `.trim();

      document.getElementById("zplOutput").value = zpl;
    }

    // Initialize the preview on page load
    updatePreview();
  </script>
</body>
</html>
