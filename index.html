<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZPL Label Generator</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .preview-container {
            width: 100%;
            height: 400px;
            background-color: white;
            border: 1px solid gray;
            border-radius: 8px;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        textarea {
            height: 100px;
            resize: none;
            font-family: monospace;
        }

        button {
            background-color: var(--primary);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ZPL Label Preview & Generator</h1>
        </header>

        <!-- Live Preview Section -->
        <div class="card">
            <label>Label Preview</label>
            <div class="preview-container">
                <canvas id="labelCanvas"></canvas>
            </div>
        </div>

        <!-- Label Details Section -->
        <div class="card">
            <label for="dept">Department Name</label>
            <input type="text" id="dept" value="IRVINGTON POLICE" />

            <label for="content">Contents</label>
            <input type="text" id="content" value="RAPE KITS" />

            <label for="boxinfo">Box Info</label>
            <input type="text" id="boxinfo" value="2026 BOX 76 #2" />

            <label for="barcode">Barcode Value</label>
            <input type="text" id="barcode" value="AIRV01PU" />
        </div>

        <!-- Output Section -->
        <div class="card">
            <label for="zplOutput">Generated ZPL Code</label>
            <textarea id="zplOutput" readonly></textarea>
            <button onclick="downloadZPL()">Download ZPL</button>
        </div>
    </div>

    <script>
        // Grab Canvas and Context
        const canvas = document.getElementById("labelCanvas");
        const ctx = canvas.getContext("2d");

        // Inputs
        const deptInput = document.getElementById("dept");
        const contentInput = document.getElementById("content");
        const boxinfoInput = document.getElementById("boxinfo");
        const barcodeInput = document.getElementById("barcode");
        const zplOutput = document.getElementById("zplOutput");

        // Canvas Dimensions
        canvas.width = 812;
        canvas.height = 500;

        // Draw Preview on Canvas
        function drawPreview() {
            const dept = deptInput.value.toUpperCase();
            const contents = contentInput.value.toUpperCase();
            const boxinfo = boxinfoInput.value.toUpperCase();
            const barcode = barcodeInput.value.toUpperCase();

            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Borders
            ctx.strokeStyle = "black";
            ctx.lineWidth = 6;
            ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);

            // Draw Department Name
            ctx.save();
            ctx.translate(680, 250);
            ctx.rotate(Math.PI / 2);
            ctx.font = "bold 50px Arial";
            ctx.textAlign = "center";
            ctx.fillStyle = "black";
            ctx.fillText(dept, 0, 0);
            ctx.restore();

            // Draw Contents
            ctx.save();
            ctx.translate(500, 250);
            ctx.rotate(Math.PI / 2);
            ctx.font = "bold 70px Arial";
            ctx.textAlign = "center";
            ctx.fillText(contents, 0, 0);
            ctx.restore();

            // Draw Box Info
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(Math.PI / 2);
            ctx.font = "bold 65px Arial";
            ctx.textAlign = "center";
            ctx.fillText(boxinfo, 0, 0);
            ctx.restore();

            // Draw Barcode (Mock)
            ctx.save();
            ctx.translate(80, 400);
            ctx.rotate(Math.PI / 2);
            ctx.font = "18px Arial";
            ctx.fillText(`|| || || ${barcode} || || ||`, 0, 0);
            ctx.restore();
        }

        // Generate ZPL Output
        function generateZPL() {
            const dept = deptInput.value.toUpperCase();
            const contents = contentInput.value.toUpperCase();
            const boxinfo = boxinfoInput.value.toUpperCase();
            const barcode = barcodeInput.value.toUpperCase();

            let zpl = `^XA\n^PW812\n^LL1015\n^LH0,0\n^CI28\n\n`;
            zpl += `^FO15,15^GB782,985,6^FS\n\n`;
            zpl += `^FO680,40\n^A0R,92,92\n^FB900,1,0,C\n^FD${dept}^FS\n\n`;
            zpl += `^FO500,40\n^A0R,130,130\n^FB900,1,0,C\n^FD${contents}^FS\n\n`;
            zpl += `^FO250,40\n^A0R,125,125\n^FB950,1,0,C\n^FD${boxinfo}^FS\n\n`;
            zpl += `^BY4,3,180\n^FO70,270\n^BCR,180,Y,N,N\n^FD${barcode}^FS\n\n`;
            zpl += `^XZ`;

            zplOutput.value = zpl;
            drawPreview();
        }

        // ZPL Download
        function downloadZPL() {
            const blob = new Blob([zplOutput.value], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "label.zpl";
            link.click();
        }

        // Event Listeners
        [deptInput, contentInput, boxinfoInput, barcodeInput].forEach(input => {
            input.addEventListener("input", generateZPL);
        });

        // Initial Render
        generateZPL();
    </script>
</body>
</html>
